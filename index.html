<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mai Pi - Digital Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="%23ffffff" opacity="0.3"/><circle cx="80" cy="40" r="1.5" fill="%23ffffff" opacity="0.4"/><circle cx="60" cy="80" r="1" fill="%23ffffff" opacity="0.2"/><circle cx="40" cy="60" r="2.5" fill="%23ffffff" opacity="0.3"/></svg>');
            pointer-events: none;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            padding: 40px 30px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(20px);
            }
        }

        .profile-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid white;
            object-fit: cover;
            margin-bottom: 20px;
            animation: scaleIn 0.8s ease-out;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .name {
            color: white;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .position {
            color: rgba(255, 255, 255, 0.9);
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .content {
            padding: 40px 30px;
            text-align: center;
        }

        .gift-button-container {
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 24px;
            box-shadow: 0 8px 20px rgba(255, 154, 158, 0.4);
        }

        .social-link:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 154, 158, 0.4);
        }

        .gift-button {
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            color: white;
            border: none;
            padding: 18px 35px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(196, 69, 105, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            font-family: 'Comic Sans MS', cursive;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 200px;
            justify-content: center;
        }

        .gift-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.6s;
        }

        .gift-button:hover::before {
            left: 100%;
        }

        .gift-button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 35px rgba(196, 69, 105, 0.6);
        }

        .gift-button:active {
            transform: translateY(-2px) scale(1.02);
        }

        .gift-icon {
            font-size: 24px;
            animation: giftBounce 2s ease-in-out infinite;
        }

        .gift-text {
            font-size: 18px;
            font-weight: 700;
        }

        @keyframes giftBounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            40% {
                transform: translateY(-5px) rotate(-5deg);
            }
            60% {
                transform: translateY(-3px) rotate(5deg);
            }
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #ff9a9e, #fecfef);
            margin: 20px auto;
            border-radius: 2px;
        }

        .contact-section {
            margin-top: 30px;
        }

        .contact-title {
            font-size: 20px;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .message-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 16px;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.3s ease;
        }

        .message-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .send-button {
            background: linear-gradient(135deg, #ff3f7a 0%, #ff6b9d 40%, #ffb3c6 100%);
            color: white;
            border: 2px solid #ff5a8d;
            padding: 18px 36px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 12px 25px rgba(255, 107, 157, 0.35);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
        }

        .send-button:disabled {
            background: linear-gradient(135deg, #cccccc 0%, #e0e0e0 100%);
            border-color: #999999;
            color: #666666;
            cursor: not-allowed;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transform: none;
        }

        .send-button:disabled:hover {
            transform: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .game-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }

        .game-title {
            font-size: 20px;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .game-container {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid #ff9a9e;
        }

        .game-description {
            color: #555;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .game-input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .guess-input {
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            width: 120px;
            text-align: center;
            transition: border-color 0.3s ease;
        }

        .guess-input:focus {
            outline: none;
            border-color: #ff9a9e;
        }

        .guess-button {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .guess-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 154, 158, 0.4);
        }

        .new-game-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .new-game-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .game-feedback {
            font-size: 18px;
            font-weight: 600;
            margin: 15px 0;
            min-height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-stats {
            color: #666;
            font-size: 14px;
            margin-top: 15px;
        }

        /* Fireworks styles */
        .firework {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
        }

        .celebration-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #ff6b9d;
            z-index: 9998;
            text-shadow: 2px 2px 10px rgba(255, 107, 157, 0.5);
            animation: celebrationPop 1s ease-out forwards;
            pointer-events: none;
        }

        @keyframes celebrationPop {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 1;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        @keyframes heartFloatUp {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 1;
            }
            50% {
                transform: translateY(-150px) rotate(180deg) scale(1.3);
                opacity: 0.9;
            }
            100% {
                transform: translateY(-300px) rotate(360deg) scale(0.7);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="avatar.jpg" alt="Mai Pi" class="profile-image" onerror="this.src='https://ui-avatars.com/api/?name=Mai+Pi&size=200&background=667eea&color=fff'">
            <h1 class="name">Mai Pi</h1>
            <p class="position">Làm Quen Với Em Nhé ❤️</p>
        </div>

        <div class="content">
            <div class="social-links">
                <a href="https://www.facebook.com/mai.pi.71/" target="_blank" class="social-link" title="Facebook">
                    <i class="fab fa-facebook-f"></i>
                </a>
            </div>

            <div class="gift-button-container">
                <button class="gift-button" onclick="triggerFireworks()">
                    <span class="gift-icon">🎁</span>
                    <span class="gift-text">Tặng quà</span>
                </button>
            </div>

            <div class="divider"></div>

            <div class="contact-section">
                <h3 class="contact-title">
                    <i class="fas fa-envelope"></i>
                    Để lại lời nhắn
                </h3>
                <form class="message-form" onsubmit="sendMessage(event)">
                    <textarea class="message-input" placeholder="Viết lời nhắn của bạn..." required></textarea>
                    <button type="submit" class="send-button">
                        <i class="fas fa-paper-plane"></i>
                        Gửi
                    </button>
                </form>
            </div>

            <div class="game-section">
                <h3 class="game-title">
                    <i class="fas fa-gamepad"></i>
                    Game Đố Số Nhanh
                </h3>
                <div class="game-container">
                    <p class="game-description">Máy tính đã nghĩ một số từ 1 đến 100. Hãy đoán xem!</p>
                    <div class="game-input-group">
                        <input type="number" id="guessInput" placeholder="Nhập số..." min="1" max="100" class="guess-input">
                        <button onclick="makeGuess()" class="guess-button">Đoán</button>
                        <button onclick="startNewGame()" class="new-game-button">Game Mới</button>
                    </div>
                    <div id="gameFeedback" class="game-feedback"></div>
                    <div id="gameStats" class="game-stats">Chưa bắt đầu game nào</div>
                </div>
            </div>

            </div>
        </div>
        <script>
        function triggerFireworks() {
            // Create multiple firework bursts
            const burstCount = 15;
            const colors = ['#FF6B6B', '#FFE66D', '#95E1D3', '#F38181', '#AA96DA', '#FCBAD3', '#ff9a9e', '#fecfef', '#ffb3ba', '#ffdfba'];

            for (let burst = 0; burst < burstCount; burst++) {
                setTimeout(() => {
                    createFireworkBurst(colors);
                }, burst * 150); // Stagger bursts
            }

            // Add floating hearts
            for (let i = 0; i < 50; i++) {
                setTimeout(() => createHeart(), i * 50);
            }

            // Show celebration message
            setTimeout(() => showCelebration(), 500);
        }

        function createFireworkBurst(colors) {
            const particleCount = 60;
            const centerX = window.innerWidth / 2 + (Math.random() - 0.5) * 200;
            const centerY = window.innerHeight / 2 + (Math.random() - 0.5) * 100;

            for (let i = 0; i < particleCount; i++) {
                createParticle(colors[Math.floor(Math.random() * colors.length)], centerX, centerY);
            }
        }

        function createParticle(color, startX, startY) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.background = color;
            particle.style.left = startX + 'px';
            particle.style.top = startY + 'px';
            particle.style.boxShadow = `0 0 15px ${color}, 0 0 30px ${color}`;

            document.body.appendChild(particle);

            const angle = (Math.random() * Math.PI * 2);
            const velocity = 8 + Math.random() * 12;
            const vx = Math.cos(angle) * velocity;
            const vy = Math.sin(angle) * velocity;

            let x = startX;
            let y = startY;
            let life = 120;
            let size = 8 + Math.random() * 6;

            particle.style.width = size + 'px';
            particle.style.height = size + 'px';

            const animate = () => {
                x += vx;
                y += vy;
                vy += 0.3; // gravity
                life -= 1;
                size *= 0.995; // shrink

                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.opacity = life / 120;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';

                if (life > 0 && size > 1) {
                    requestAnimationFrame(animate);
                } else {
                    particle.remove();
                }
            };

            animate();
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '💖';
            heart.style.position = 'fixed';
            heart.style.left = (window.innerWidth / 2 + (Math.random() - 0.5) * 300) + 'px';
            heart.style.top = window.innerHeight + 'px';
            heart.style.fontSize = (Math.random() * 25 + 15) + 'px';
            heart.style.pointerEvents = 'none';
            heart.style.zIndex = '9999';
            heart.style.animation = 'heartFloatUp 4s ease-out forwards';

            document.body.appendChild(heart);

            setTimeout(() => heart.remove(), 4000);
        }

        function sendMessage(event) {
            event.preventDefault();

            const textarea = event.target.querySelector('.message-input');
            const sendButton = event.target.querySelector('.send-button');
            const message = textarea.value.trim();

            if (message) {
                // Disable button temporarily
                sendButton.disabled = true;
                sendButton.textContent = 'Đang gửi...';

                // Send to Telegram
                sendToTelegram(message).then(() => {
                    // Clear form
                    textarea.value = '';

                    // Re-enable button after 3 seconds
                    setTimeout(() => {
                        sendButton.disabled = false;
                        sendButton.innerHTML = '<i class="fas fa-paper-plane"></i> Gửi';
                        updateSendButtonState(textarea, sendButton);
                    }, 3000);

                    // Show success message
                    alert('Cảm ơn bạn đã gửi tin nhắn! Mai sẽ nhận được qua Telegram 💕');
                }).catch(() => {
                    // Re-enable button on error
                    sendButton.disabled = false;
                    sendButton.innerHTML = '<i class="fas fa-paper-plane"></i> Gửi';
                    alert('Có lỗi xảy ra, vui lòng thử lại!');
                });
            }
        }

        function updateSendButtonState(textarea, sendButton) {
            const message = textarea.value.trim();
            sendButton.disabled = message.length === 0;
        }

        async function sendToTelegram(message) {
            const botToken = '8681996362:AAGP1U2vMdDOLbqdJaC07TN0-QMamSqWU98'; // Thay bằng token bot của bạn
            const chatId = '5720015405'; // Thay bằng chat ID của bạn

            const text = `📨 Tin nhắn mới từ trang web:\n\n"${message}"\n\n⏰ ${new Date().toLocaleString('vi-VN')}`;

            const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: text,
                    parse_mode: 'HTML'
                })
            });

            const data = await response.json();

            if (!data.ok) {
                throw new Error('Failed to send message');
            }

            return data;
        }

        // Load messages on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize send button state
            const textarea = document.querySelector('.message-input');
            const sendButton = document.querySelector('.send-button');

            if (textarea && sendButton) {
                updateSendButtonState(textarea, sendButton);

                // Listen for input changes
                textarea.addEventListener('input', function() {
                    updateSendButtonState(textarea, sendButton);
                });
            }

            // Initialize game
            startNewGame();

            // Add Enter key listener for game input
            const guessInput = document.getElementById('guessInput');
            if (guessInput) {
                guessInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        makeGuess();
                    }
                });
            }
        });

        // Game variables
        let targetNumber = 0;
        let attempts = 0;
        let gamesPlayed = 0;
        let totalAttempts = 0;

        function startNewGame() {
            targetNumber = Math.floor(Math.random() * 100) + 1;
            attempts = 0;
            document.getElementById('guessInput').value = '';
            document.getElementById('gameFeedback').innerHTML = '<span style="color: #ff9a9e;">🎯 Game mới đã bắt đầu! Hãy đoán số từ 1-100</span>';
            updateGameStats();
        }

        function makeGuess() {
            const guessInput = document.getElementById('guessInput');
            const guess = parseInt(guessInput.value);

            if (isNaN(guess) || guess < 1 || guess > 100) {
                document.getElementById('gameFeedback').innerHTML = '<span style="color: #ff6b35;">⚠️ Vui lòng nhập số từ 1 đến 100!</span>';
                return;
            }

            attempts++;
            let feedback = '';

            if (guess === targetNumber) {
                feedback = `<span style="color: #4CAF50;">🎉 Chính xác! Số là ${targetNumber}. Bạn đoán đúng sau ${attempts} lần!</span>`;
                gamesPlayed++;
                totalAttempts += attempts;

                // Show celebration
                setTimeout(() => {
                    for (let i = 0; i < 10; i++) {
                        setTimeout(() => createHeart(), i * 100);
                    }
                }, 500);

            } else if (guess < targetNumber) {
                feedback = `<span style="color: #2196F3;">📈 Quá thấp! Hãy thử số lớn hơn</span>`;
            } else {
                feedback = `<span style="color: #ff9800;">📉 Quá cao! Hãy thử số nhỏ hơn</span>`;
            }

            document.getElementById('gameFeedback').innerHTML = feedback;
            updateGameStats();

            if (guess === targetNumber) {
                setTimeout(() => {
                    if (confirm('🎊 Chúc mừng! Bạn muốn chơi lại không?')) {
                        startNewGame();
                    }
                }, 1500);
            }
        }

        function updateGameStats() {
            const avgAttempts = gamesPlayed > 0 ? (totalAttempts / gamesPlayed).toFixed(1) : 0;
            document.getElementById('gameStats').textContent =
                `Đã chơi: ${gamesPlayed} game | Trung bình: ${avgAttempts} lần đoán/game | Lần đoán hiện tại: ${attempts}`;
        }
    </script>
</body>
</html>
